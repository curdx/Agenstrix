name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx @biomejs/biome check .

      - name: Unit tests
        run: bun test tests/unit/

      - name: Smoke tests (POSIX)
        if: runner.os != 'Windows'
        run: bun test tests/smoke/

      - name: Smoke tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: bun test tests/smoke/
